<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SurfView</title>
<link rel="stylesheet" href="../../css/style.css?version=1.6.8">
</head>
<body id="body">
<button id="closeRightMenu" class="close-button">&#10005;</button>

    <div id="modalWindow">
    
        <div id="efm" class="efm">
            
            <div id="encryptedFileManager" class="efm"> 
            
            <h4>Encrypted File Manager</h4>
                <div><label for="websiteUrl">File to encrypt and store:</label></div>
                <div>
                <button id="btnBrowse" name="encryptedFile" class="btn btn-primary">Browse File</button>
                <span id="selectedFileName">No file selected</span>
                </div>
                <label>Encryption password:</label>
                <div><input type="password" id="encryptedPassword" name="encryptedPassword" class="btn btn-primary" /></div>
                <div>
                <button class="btn btn-icon" id="btnEncryptFile" title="">Encrypt File</button>
                </div>
                <hr />
            </div>
            <h4>Encrypted Files</h4>
            <div id="fileList" class="fileList"></div>
        </div>
        
    </div>

<script src="../renderer/renderer.js"></script>

<script>
        
    let pass = null;
    let session = window.surfview.getValue('sessionPWM');

    function readFileAsArrayBuffer(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }
    
async function unlockFile(file,password) {

    const pathLink = await window.surfview.getUserPath() + '\\' + file;
    const pw = document.getElementById(password).value;
    const result = await window.surfview.decryptFile(file, pw);
    const btnEncryptFile = document.getElementById('btnEncryptFile');

    if (result.success) {
        window.surfview.dialog(`Decrypted!\nSaved as: ${result.out}`);
        } else {
        window.surfview.dialog('Error: ' + result.error);
    } 
}
    
document.addEventListener('DOMContentLoaded', async () => {

    const files = await window.surfview.readDir('private-files');
    const privateFolderPath = await window.surfview.getUserPath('private-files');
    const closeButton = document.getElementById('closeRightMenu');
    
    if (closeButton) {
        closeButton.addEventListener('click', async () => {
            if (window.surfview && window.surfview.closeWindow) {
                window.surfview.updatePWMStatus().then(function() {
                    window.surfview.closeWindow();
                });
            } else {
                console.error('surfview.closeWindow is not available');
            }
        });
    }

    const btnBrowse = document.getElementById('btnBrowse');
    const btnEncryptFile = document.getElementById('btnEncryptFile');
    let selectedFilePath = null;

    btnBrowse.addEventListener('click', async () => {
        const filePath = await window.surfview.openFileDialog();
        if (filePath) {
            selectedFilePath = filePath;
            document.getElementById('selectedFileName').textContent = filePath.split('\\').pop();
        }
    });

    btnEncryptFile.addEventListener('click', async () => {
    
        if (!selectedFilePath) {
            window.surfview.dialog('Please select a file first');
            return;
        }

        const password = document.getElementById('encryptedPassword').value;
        const fileName = selectedFilePath.split('\\').pop();
        const outputPath = privateFolderPath + '\\' + `encrypted_${fileName}`;
        console.log(outputPath);
        
        document.getElementById('btnEncryptFile').textContent = 'Encrypting file...';
        
        const result = await window.surfview.createEncryptedFile(selectedFilePath, outputPath, password);

        if (result.success) {
            window.surfview.dialog(`Encrypted!\nSaved as: ${result.outputPath}`);
            document.getElementById('btnEncryptFile').textContent = 'Encrypt File';
            document.location.reload();
        } else {
            window.surfview.dialog('Error: ' + result.error);
        }
    });

    if (files.length >= 1) {
        let body = document.getElementById('body');
        body.style.overflowY = 'auto';

        let parent = document.getElementById('fileList');

        for (let i = 0; i < files.length; i++) {
            const child = document.createElement('div');
            child.innerHTML = `<input class="btn btn-primary" type="password" placeholder="password" id="fileListPassword${i}" /><button class="btn1 btn-primary-unlock" onclick="unlockFile('${files[i].name}','fileListPassword${i}');">🔓 - ${files[i].name}</button>`;
            parent.appendChild(child);
        }
    }

});

</script>

</body>
</html>
