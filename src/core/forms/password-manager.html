<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SurfView</title>
<link rel="stylesheet" href="../../css/style.css?version=1.6.7">
<style>
    body { 
        overflow-y: auto;
    }
</style>
</head>
<body>
<button id="closeRightMenu" class="close-button">&#10005;</button>

    <div id="modalWindow">
    
        <div id="loginBox" class="loginBox">

            <div id="vault"></div>
            <div id="res"></div>
            <div id="addWebsite" class="addWebsite"> 
            <h4>Add website</h4>
                <div><label for="websiteUrl">Url:</label></div>
                <div><input type="text" id="websiteUrl" name="websiteUrl" value="https://" class="btn btn-primary" /></div>
                <div><label for="websiteUser">Username:</label></div>
                <div><input type="text" id="websiteUser" name="websiteUser" value="" class="btn btn-primary" /></div>
                <div><label for="websitePasswd">Password:</label></div>
                <div><input type="password" id="websitePasswd" name="websitePasswd" value="" class="btn btn-primary" /></div>
                <div><label for="websitePin">Master PIN:</label></div>
                <div><input type="text" id="websitePin" name="websitePin" size="8" value="" class="btn btn-primary" /></div>
                <div></div>
                <div><button class="btn btn-icon" id="btnCreateWebsite" title="" onclick="addWebsite();">Add website</button></div>
                <hr />
            </div>

            <div id="passwordList" class="passwordList"></div>
            
            <!--
                <div id="bookmarksFoldersCtrl">
                    <select name="toFolder" id="toFolder" class="btn btn-primary">
                        <option value="bookmarksbar">
                        </option>
                    </select>
                    <button class="btn btn-icon" id="btnCreateFolder" title="Create folder">
                    </button>
                </div>
            -->
            
        </div>
        
    </div>
    
 <script src="../renderer/renderer.js"></script>
   
  <script>
  
    let pass = null;
    let session = window.surfview.getValue('sessionPWM');

    function addWebsite() {
    
        let website = document.getElementById('websiteUrl');
        let user = document.getElementById('websiteUser');
        let passwd = document.getElementById('websitePasswd');
        let pin = document.getElementById('websitePin');
        window.surfview.addPass(website.value, user.value, passwd.value, pin.value).then(
        function(result) {
            if(result != false) { 
                window.surfview.dialog('Added website! reload the password manager to see changes.');
                } else {
                window.surfview.dialog("Cannot retrieve temporary master password, close and re-open this window, or restart SurfView.");
            }
          }
        );
    }
    
    // Wait for DOM to be fully loaded
    document.addEventListener('DOMContentLoaded', () => {

        let passwordList1 = document.getElementById('passwordList');
        let addWebsite1 = document.getElementById('addWebsite');
        
        passwordList1.className = 'passwordList hide';
        addWebsite1.className = 'addWebsite hide';
           
        window.surfview.getValue('vaultStatus').then(
            function(status) {
                const vault = document.getElementById('vault');
                if(status == 'first-run') {
                    vault.appendChild(createProtectVaultSection());
                    } else {
                    vault.appendChild(createunlockVaultSection());
                    const lb = document.getElementById('loginBox');
                    lb.focus();
                } 
            }
        )
           
        // Create the "Protect Vault" section
        function createProtectVaultSection() {
        
            // Main container
            const protectVaultDiv = document.createElement('div');
            protectVaultDiv.id = 'protectVault';

            // Heading
            const headingDiv = document.createElement('div');
            const heading = document.createElement('h1');
            heading.textContent = 'Protect Vault';
            headingDiv.appendChild(heading);
            protectVaultDiv.appendChild(headingDiv);

            // Description
            const descriptionDiv = document.createElement('div');
            const description = document.createElement('p');
            description.textContent = 'Fill in a new vault password. Make sure it\'s at least 12 chars long. ';
            description.textContent += 'Better 16-20 chars. Use Diceware words if possible.';
            descriptionDiv.appendChild(description);
            protectVaultDiv.appendChild(descriptionDiv);

            // Password input
            const inputDiv = document.createElement('div');
            const passwordInput = document.createElement('input');
            passwordInput.type = 'password';
            passwordInput.name = 'password';
            passwordInput.size = 40;
            passwordInput.id = 'loginBox';
            passwordInput.className = 'btn btn-primary';
            let label = document.createElement('label');
            label.textContent = 'Password:';
            inputDiv.appendChild(passwordInput);
            protectVaultDiv.appendChild(label);
            protectVaultDiv.appendChild(inputDiv);

            // PIN input
            const inputPinDiv = document.createElement('div');
            let label1 = document.createElement('label');
            label1.textContent = 'PIN:';
            
            const pinInput = document.createElement('input');
            pinInput.type = 'text';
            pinInput.name = 'pin';
            pinInput.size = 10;
            pinInput.id = 'pinBox';
            pinInput.className = 'btn btn-primary';
            inputPinDiv.appendChild(pinInput);
            protectVaultDiv.appendChild(label1);
            protectVaultDiv.appendChild(inputPinDiv);
            
            // Button
            const buttonDiv = document.createElement('div');
            const setButton = document.createElement('button');
            setButton.className = 'btn btn-icon';
            setButton.size = 40;
            setButton.id = 'setVaultPassword';
            setButton.title = 'Set Vault PIN and Password';
            setButton.textContent = 'Set Vault PIN and Password';
            setButton.onclick = () => {
                const pw = passwordInput.value;
                const pin = pinInput.value;
                if(!pw || !pin) {
                    window.surfview.dialog('PIN or Password cannot be empty.');
                    } else {
                    createVault(pw,pin);
                }
            };
            buttonDiv.appendChild(setButton);
            protectVaultDiv.appendChild(buttonDiv);

            return protectVaultDiv;
        }

        function createunlockVaultSection() {
            // Main container
            const protectVaultDiv = document.createElement('div');
            protectVaultDiv.id = 'protectVault';

            // Heading
            const headingDiv = document.createElement('div');
            const heading = document.createElement('h1');
            heading.textContent = 'Unlock Vault';
            headingDiv.appendChild(heading);
            protectVaultDiv.appendChild(headingDiv);

            // Description
            const descriptionDiv = document.createElement('div');
            const description = document.createElement('p');
            description.textContent = 'Fill in your vault password.';
            descriptionDiv.appendChild(description);
            protectVaultDiv.appendChild(descriptionDiv);

            // Password input
            const inputDiv = document.createElement('div');
            const passwordInput = document.createElement('input');
            passwordInput.type = 'password';
            passwordInput.name = 'password';
            passwordInput.id = 'loginBox';
            passwordInput.size = 40;
            passwordInput.className = 'btn btn-primary';
            inputDiv.appendChild(passwordInput);
            protectVaultDiv.appendChild(inputDiv);

            // Button
            const buttonDiv = document.createElement('div');
            const setButton = document.createElement('button');
            setButton.className = 'btn btn-icon';
            setButton.id = 'setVaultPassword';
            setButton.title = 'Vault password';
            setButton.textContent = 'Unlock Vault';
            setButton.size = 40;

            setButton.onclick = () => {
                const pw = passwordInput.value;
                unlockVault(pw);
            };

            buttonDiv.appendChild(setButton);
            protectVaultDiv.appendChild(buttonDiv);

            return protectVaultDiv;
        }
            
        function backupDIV() {
        
            const pwl = document.getElementById('passwordList');
            let d1 = document.createElement('div');
            d1.id = 'backup';
            
            let d2 = document.createElement('div');
            let b1 = document.createElement('button');
            
            b1.title = '';
            b1.id = 'btnCreateWebsite';
            b1.class = 'btn btn-icon';
            b1.onclick = makePWMBackup();
            b1.textContent = 'Backup Password Database.';
            
            d2.appendChild(d1);
            d2.appendChild(b1);
            pwl.appendChild(d2);
            
        }    
        
        function makePWMBackup() {
        
        }
        
        function createVault(pw,pin) {
            const vault = document.getElementById('vault');
            const res = document.getElementById('res');
            window.surfview.initVault(pw,pin).then(function(result) {
                if(result == true) {
                    window.surfview.setValue('vaultStatus','created');
                    vault.innerHTML = '';
                    vault.appendChild(createunlockVaultSection());
                    pw = null;
                    } else {
                    res.textContent = 'Vault creation error!';
                }
            });
        }

        function unlockVault(pw) {
            const res = document.getElementById('res');
            window.surfview.unlockVault(pw).then(function(result) {
                if(result) {
                    vault.innerHTML = '';
                    res.textContent = '';
                    let passwordList = document.getElementById('passwordList');
                    let addWebsite = document.getElementById('addWebsite');
                    passwordList.className = 'passwordList active';
                    addWebsite.className = 'addWebsite active';
                    window.surfview.setValue('sessionPWM', 'active');
                    fetchPasswords(pw);
                    window.surfview.updatePWMStatus(); 
                    pw = null;
                    } else {
                    res.textContent = 'Vault unlock error!';
                }
            });
        }
        
        function fetchPasswords(pw) {
        
            window.surfview.fetchPw(pw).then(
            
                function(vault) {
                
                    const passwordList = document.getElementById('passwordList');
                    
                    passwordList.innerHTML = '<h4>Password Manager</h4>';

                    if (Object.keys(vault).length === 0) {
                        passwordList.textContent = 'No passwords stored yet';
                        return;
                    }

                    // Create table for passwords
                    const table = document.createElement('table');
                    table.style.width = '100%';
                    
                    table.style.borderCollapse = 'collapse';
                    table.style.marginTop = '10px';
         
                    // Create header
                    const header = table.insertRow();
                    ['Host', 'Username', 'Password', 'Enter PIN to Unmask'].forEach(text => {
                        const th = document.createElement('th');
                        th.textContent = text;
                        th.style.border = '1px solid #333';
                        th.style.padding = '5px';
                        header.appendChild(th);
                    });

                    let count = 0;

                    const obj = JSON.parse(vault);
                    
                    for (const key in obj) {
                    
                        const entry = obj[key];
                    
                        let domainName = sanitizeUrl(entry.host || key, 'host');
                        
                        if (entry && entry.username && entry.password) {

                            const username = entry.username;
                            const password = entry.password;

                            const row = table.insertRow();

                            // Domain
                            const domainCell = row.insertCell();
                            const domain = document.createElement('input');
                            domain.value = domainName;
                            domain.className = 'btn btn-icon';
                            domain.size = 12;
                            domain.id = 'host' + count;
                            domain.style.cursor = 'text';
                            domainCell.style.padding = '5px';
                            domainCell.style.border = '1px solid #333';
                            domainCell.appendChild(domain);
                            
                            // Username (masked)
                            const userCell = row.insertCell();
                            const un = document.createElement('input');
                            un.value = username;
                            un.id = 'user' + count;
                            un.type = 'password';
                            un.className = 'btn btn-icon';
                            un.style.cursor = 'text';
                            un.size = 12;
                            userCell.style.padding = '5px';
                            userCell.style.border = '1px solid #333';
                            userCell.style.cursor = 'pointer';
                            userCell.appendChild(un);

                            // Password (masked)
                            const passCell = row.insertCell();
                            const pw = document.createElement('input');
                            pw.value = password;
                            pw.size = 12;
                            pw.type = 'password';
                            pw.className = 'btn btn-icon';
                            pw.id = 'pass' + count;
                            pw.style.cursor = 'text';
                            passCell.style.padding = '5px';
                            passCell.style.border = '1px solid #333';
                            passCell.appendChild(pw);
                            
                            // Copy button
                            
                            const actionCell = row.insertCell();
                            
                            const pin = document.createElement('input');
                            pin.type = 'input';
                            pin.name = 'pin';
                            pin.id = 'pin' + count;
                            pin.size = 4;
                            pin.value = 'PIN';
                            pin.className = 'btn btn-icon';
                            pin.style.float = 'left';
                            pin.style.marginRight = '5px';
                            pin.style.cursor = 'text';
                            pin.onfocus = function() {
                                this.value = '';
                            }
                            
                            const unMask = document.createElement('button');
                            unMask.textContent = ' >> Unmask';
                            unMask.className = 'btn btn-icon';
                            unMask.id = count;
                            unMask.onclick = (e) => {
                                let id = e.target.id;
                                let domain1 = document.getElementById('host' + id);
                                let pin1 = document.getElementById('pin' + id);
                                let user1 = document.getElementById('user' + id);
                                let pass1 = document.getElementById('pass' + id);
                                user1.type = 'text';
                                pass1.type = 'text';
                                tempUser = user1.value;
                                tempPass = pass1.value;
                                
                                decodeEntry('username',user1.value,pin1.value).then( function(v) {
                                    user1.value = v;
                                });
                                
                                decodeEntry('password',pass1.value,pin1.value).then( function(v) {
                                    pass1.value = v;
                                });

                                setTimeout(() => { 
                                    user1.type = 'password';
                                    user1.value = tempUser;
                                    pass1.type = 'password';
                                    pass1.value = tempPass;
                                }, 6000);
                            };
                            actionCell.appendChild(pin);
                            actionCell.appendChild(unMask);
                            actionCell.style.padding = '5px';
                            actionCell.style.border = '1px solid #333';
                            count++;
                        }
                    }

                    if (count === 0) {
                        passwordList.textContent = 'No valid password entries found';
                        } else {
                        passwordList.appendChild(table);
                    }
                }
                
            ).catch(error => {
                console.error('Error:', error);
                document.getElementById('passwordList').textContent = 'Error loading passwords';
            });

            window.surfview.getUrl().then(function(val) {
                if(val) { 
                    let urltosave = document.getElementById('websiteUrl');
                    urltosave.value = val;
                } 
            });
        }
        
        // Close button functionality
        const closeButton = document.getElementById('closeRightMenu');
        if (closeButton) {
            closeButton.addEventListener('click', () => {
                try {
                    window.surfview.clearPass();
                    window.surfview.updatePWMStatus();
                } catch(e) {}
                if (window.surfview && window.surfview.closeWindow) {
                    window.surfview.updatePWMStatus().then(function() {
                        window.surfview.closeWindow();
                    });
                    } else {
                    console.error('surfview.closeWindow is not available');
                }
            });
        }
    });
    
    
  </script>

</body>
</html>
